<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Bloom - Create Account</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sky: {
                            200: "#cfd89a", 300: "#b5c46a", 400: "#9aad3d",
                            500: "#7d8f28", 950: "#111504"
                        },
                        indigo: {
                            300: "#c8a472", 400: "#b08348",
                            500: "#8f6530", 950: "#130d04"
                        },
                        violet: {
                            400: "#b08348", 500: "#8f6530"
                        },
                        slate: {
                            50: "#faf8f3", 100: "#f0ebe0", 200: "#ddd4c2",
                            300: "#c4b89a", 400: "#a89870", 500: "#8a7a58",
                            600: "#6e6040", 700: "#524830", 800: "#3a3222",
                            850: "#2e2819", 900: "#231e12", 950: "#17120a"
                        },
                        amber: {
                            300: "#e8c97a", 400: "#c9a03e", 500: "#a07a28",
                            900: "#2a1f08", 950: "#1a1305"
                        }
                    }
                }
            }
        }
    </script>
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="selection:bg-sky-500/30 selection:text-sky-200 bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- Ambient Glow Spot -->
    <div class="ambient-glow top-[50%] left-[50%] -translate-x-[50%] -translate-y-[50%] opacity-45"></div>

    <!-- Navigation Header -->
    <header class="relative z-10 w-full max-w-7xl mx-auto px-6 py-5 flex items-center justify-between border-b border-slate-900/40">
        <a href="/" class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center font-bold font-display text-slate-950 shadow-lg shadow-sky-500/20 text-lg">B</div>
            <span class="font-display font-bold text-xl tracking-wide bg-gradient-to-r from-slate-100 via-slate-100 to-sky-400 bg-clip-text text-transparent">Bloom</span>
        </a>
        <a href="/" class="text-slate-400 hover:text-slate-100 text-sm transition font-medium">&larr; Back to Home</a>
    </header>

    <!-- Main Container -->
    <main class="relative z-10 w-full max-w-7xl mx-auto px-6 py-12 flex flex-col items-center justify-center flex-grow">

        <div class="w-full max-w-md p-8 rounded-2xl glass-panel relative">
            <div class="absolute -top-6 left-1/2 -translate-x-1/2 w-12 h-12 rounded-xl bg-gradient-to-br from-sky-450 to-indigo-450 flex items-center justify-center font-bold font-display text-slate-950 shadow-lg shadow-sky-500/20 text-xl border border-slate-950">
                S
            </div>

            <div class="text-center mt-4 mb-6">
                <h2 class="font-display font-bold text-2xl text-slate-100 tracking-tight">Create Workspace Account</h2>
                <p class="text-slate-400 text-xs mt-1">First registered user is assigned **ADMINISTRATOR** role</p>
            </div>

            <!-- Error Alerts -->
            <div id="errorAlert" class="hidden p-3.5 bg-rose-950/20 border border-rose-500/20 text-rose-300 rounded-xl text-xs mb-4">
                Registration error details.
            </div>

            <!-- Success Alerts -->
            <div id="successAlert" class="hidden p-3.5 bg-emerald-950/20 border border-emerald-500/20 text-emerald-300 rounded-xl text-xs mb-4">
                Registration complete! Pending administrator checks.
            </div>

            <!-- Form -->
            <form id="signupForm" class="space-y-4">
                <div>
                    <label for="username" class="block text-2xs uppercase tracking-wider font-semibold font-mono text-slate-400 mb-1.5">Username</label>
                    <input type="text" id="username" required autocomplete="username" class="w-full px-4 py-3 rounded-xl glass-input text-sm" placeholder="Enter username">
                </div>

                <div>
                    <label for="email" class="block text-2xs uppercase tracking-wider font-semibold font-mono text-slate-400 mb-1.5">Email Address</label>
                    <input type="email" id="email" required autocomplete="email" class="w-full px-4 py-3 rounded-xl glass-input text-sm" placeholder="e.g. workspace@bloom.ai">
                </div>

                <div>
                    <label for="password" class="block text-2xs uppercase tracking-wider font-semibold font-mono text-slate-400 mb-1.5">Password</label>
                    <input type="password" id="password" required autocomplete="new-password" class="w-full px-4 py-3 rounded-xl glass-input text-sm" placeholder="••••••••">
                </div>

                <div>
                    <label for="confirm_password" class="block text-2xs uppercase tracking-wider font-semibold font-mono text-slate-400 mb-1.5">Confirm Password</label>
                    <input type="password" id="confirm_password" required autocomplete="new-password" class="w-full px-4 py-3 rounded-xl glass-input text-sm" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-sky-400 to-indigo-500 hover:from-sky-300 hover:to-indigo-400 text-slate-950 font-semibold rounded-xl text-center tracking-tight shadow-lg shadow-sky-500/10 hover:shadow-sky-500/20 transition duration-205 mt-2">
                    Submit Application
                </button>
            </form>

            <div class="text-center mt-6 pt-4 border-t border-slate-900/40 text-xs text-slate-400">
                Already registered? <a href="/login" class="text-sky-400 font-medium hover:underline">Sign In</a>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full max-w-7xl mx-auto px-6 py-6 border-t border-slate-900/40 text-center text-3xs text-slate-500 font-mono uppercase tracking-widest">
        SQLITE DATABASE REGISTRY ACTIVE
    </footer>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>

</body>
</html>
